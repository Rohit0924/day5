services:

  mongo:
    image: mongo
    container_name: mongo

  backend:
    build: ./backend

    depends_on:
      - mongo

  frontend:
    build: ./frontend

  nginx:
    image: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend